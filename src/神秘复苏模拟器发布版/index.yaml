      <script>
      (() => {
        const statusUrl = 'https://cdn.jsdelivr.net/gh/linlangliehu/tavern_helper_template@v0.0.1/dist/%E7%A5%9E%E7%A7%98%E5%A4%8D%E8%8B%8F%E6%A8%A1%E6%8B%9F%E5%99%A8/%E7%95%8C%E9%9D%A2/%E7%8A%B6%E6%80%81%E6%A0%8F/index.html';
        const maxAttempts = 20;

        const loadStatus = (attempt = 1) => {
          $('body').load(`${statusUrl}?t=${Date.now()}`, (_response, status) => {
            if (status === 'error' && attempt < maxAttempts) {
              setTimeout(() => loadStatus(attempt + 1), 1000);
            }
          });
        };

        loadStatus();
      })();
      </script>
      </body>
