---
变量更新规则:
  神秘复苏铁律:
    - 鬼无法被杀死，只能被压制、关押、转移、绕开或被另一只鬼暂时制衡。
    - 能对付鬼的只有鬼；普通武器、普通体能和普通理性只能拖延，不能真正解决灵异事件。
    - 未被观察验证的杀人规律只能写入「猜测杀人规律」，不能直接写入「已知杀人规律」。
    - 经过明确观察、试探、代价或死亡案例验证后，猜测才能转入「已知杀人规律」。
    - 玩家误判规律、采取无效策略或被线索误导时，必须记录到「错误推断」或「规律推理记录」。
  风险与死亡:
    - 「风险值」表示玩家角色整体死亡风险，范围 0 到 100；达到或超过 100 时，角色死亡，本次模拟结束。
    - 状态面板中的「死亡风险」只是「风险值」的显示名称，不是 MVU 变量路径；变量更新不得写入「死亡风险」。
    - 每次玩家行动结算前，必须先参考「灵异对抗判定规则｜v1」读取当前风险、事件档案、规律推理记录、灵异资源和隐藏档案，再决定风险增量。
    - 玩家被厉鬼袭击、误判杀人规律、进入高危鬼域、失去保护资源、重伤或被灵异标记时，必须增加「风险值」。
    - 玩家选择的推演选项若会暴露在杀人规律、鬼域袭击、错误路线、失去保护或高概率受伤中，结算时必须增加「风险值」。轻度危险通常增加 3 到 8 点；明显危险通常增加 10 到 20 点；致命误判、身体试探或直接命中杀人规律可增加 25 到 45 点，保护资源不足时可直接进入濒死或死亡线。
    - 接触媒介通常增加 5 到 12 点；疑似杀人条件的媒介增加 12 到 25 点；进入鬼域或异常空间增加 8 到 20 点，深入核心或失联时增加 20 到 35 点。
    - 连续三轮选择同类高危行动（进鬼域、身体试探、强行用鬼、正面对抗）时，第三轮起必须额外增加 5 到 15 点死亡风险或复苏风险，表示累积压力。
    - 如果「风险值」达到或超过 100，或角色已判定死亡，必须同时：replace「状态」为「死亡」；replace「is_dead」为 true；replace「主线进度.阶段状态」为「模拟结束」；replace「行动建议」为 []；并在正文中明确本次模拟结束。禁止只写「状态=死亡」而漏 is_dead 或阶段状态。
    - 完成当前主线节点、成功处理当前灵异事件、暂时脱离当前灵异事件影响范围、进入黄金隔绝环境、获得总部救援或明确解除灵异标记后，应根据安全程度降低「风险值」。短暂脱离通常降低 5 到 10 点；完成关键节点或稳定隔绝通常降低 10 到 20 点；彻底处理事件可降低更多。
    - 降低「风险值」只能来自明确的逃脱、隔绝、压制、替死、救援、完成主线节点、暂时脱离灵异事件或解除标记，不能无依据下降。
  复苏与代价:
    - 「驭鬼者状态.总复苏风险」是正式复苏风险字段；「厉鬼复苏程度」只作为旧字段兼容镜像，不作为主更新目标。
    - 使用厉鬼能力、强行对抗高恐怖程度灵异、进入鬼域深处或被灵异侵蚀时，必须增加「驭鬼者状态.总复苏风险」。
    - 每次主动使用自身厉鬼能力，通常增加 10 到 20 点复苏风险；若连续使用、过度透支或被更高恐怖程度灵异压制，增加 20 到 35 点，并按反噬程度同步增加「风险值」。
    - 使用外部灵异物品不等于无代价：鬼烛、替死娃娃、黄金容器必须记录剩余状态；人皮纸、鬼橱、鬼钱等交易型资源必须记录副作用、债务、隐藏风险或世界线影响。
    - 玩家选择的推演选项若主动使用厉鬼能力、强行压制厉鬼、进入鬼域深处或以身体试探规律，结算时必须增加「驭鬼者状态.总复苏风险」，并根据反噬程度同步增加「风险值」。
    - 如果某只鬼拼图被触发，优先更新「驭鬼者状态.已驾驭厉鬼」中对应对象的「复苏进度」。
    - 当复苏风险达到或超过 100，应判定厉鬼复苏或进入极端濒死状态，除非有明确的鬼与鬼压制、死机或替死资源。
  驾驭与收录面板:
    - 「驭鬼者状态.已驾驭厉鬼」是前端“驾驭厉鬼”面板的主要数据源；玩家新驾驭、失去、死机、平衡或压制某只厉鬼时，应更新对应对象的代号、杀人规律、拼图特征、使用能力、使用代价、复苏进度、是否死机和压制关系。
    - 更新「驭鬼者状态.已驾驭厉鬼」时必须用 op:"replace" 替换整个数组为当前完整名单；不得用 op:"insert" 追加单个条目，否则会导致厉鬼档案每轮重复累积。
    - 「收录档案」适配开局厉鬼“鬼档案”。当玩家通过观察、死亡案例、试探、档案权限或灵异档案视野发现一只厉鬼时，即使尚未收录，也可以 insert 到「收录档案」；字段包括档案厉鬼名称、收录状态、厉鬼信息、已知规律、猜测规律、鬼域、收录进度、档案完整度、可调用范围。
    - 「收录档案」必须显示未收录、收录中和已收录的档案厉鬼。收录进度为 0-100 数值；未达到 100 时收录状态不得写“已收录/收录成功”，达到 100 后才可判定收录成功并开放相应可调用范围。
    - 「收录规律」适配开局厉鬼“鬼拓本”和“鬼手印”。鬼拓本拓印规律、融合同类规律、分解异类规律，或鬼手印接触窃取灵异规律时，可以 insert 到「收录规律」；字段包括来源厉鬼、获取方式、规律类型、规律内容、规律进阶、规律分解、完整度、风险备注。
    - 「收录档案」和「收录规律」会显示在玩家可见前端面板；只能写玩家已观察、已验证或可见推断的信息。隐藏档案里的真实杀人规律、关键生路、鬼的真实位置和幕后转折不得直接写入这两个字段。
  灵异事件档案:
    - 出现新灵异事件时，更新「当前灵异事件.事件代号」「发生地点」「处理状态」。
    - 危害等级必须根据已表现出的影响范围、扩散规模、死亡规模、封锁难度和总部响应逐步判断，不要随意给出 S 级，也不要无理由降级；危害等级不是厉鬼恐怖程度，不能直接当作灵异对抗强弱。
    - 厉鬼「恐怖程度」是叙述词；MVU 真字段为「驭鬼者状态.已驾驭厉鬼[].恐怖等级」（整表 replace）。可在「最近行动判定」「规律推理记录」「当前灵异事件」可见摘要或厉鬼档案中体现；禁止写不存在的「恐怖程度」根路径。
    - 出现鬼域、城市扩散、群体死亡或总部介入时，更新「鬼域状态」「扩散趋势」「已死亡人数」「势力关系」。
    - 每个灵异事件条目触发时，都要检查是否需要更新「当前灵异事件.鬼域状态」「猜测杀人规律」「已知杀人规律」「错误推断」和「规律推理记录」。
    - 每次玩家行动被结算后，必须在 JSON Patch 中 replace「最近行动判定」；不能只保留默认值，不能省略。只写本轮行动的类型、依据、结果、代价和风险变化，不要写隐藏真相。
    - 「最近行动判定.依据」只能使用玩家可见依据：观察、试探、死亡案例、NPC档案、总部资料、现场反应或已确认资源；不得引用隐藏档案里的真实规律、关键生路或鬼的真实位置。
    - 存活且本轮生成或刷新 A/B/C/D 时，必须在 JSON Patch 中 replace「行动建议」为恰好 4 条（选项 A/B/C/D 齐全，D 固定为自定义行动），并与 `<choices>` 一致；死亡或「风险值」≥100 时禁止输出 `<choices>`，并 replace「行动建议」为 []。建议只能基于玩家可见信息，不得泄露完整杀人规律、关键生路或后期档案。
    - 真实杀人规律、关键生路、鬼的真实位置、误导线索和高权限情报优先写入「隐藏档案」，不要直接写进正文或状态面板。
    - 玩家改变死亡名单、关键人物状态、灵异物品归属、地点封锁状态、总部行动或原剧情节点时，必须写入「世界线记录」。
    - 总部、负责人、朋友圈、灵异论坛、国王组织、民间驭鬼者、鬼邮局信使等势力介入时，必须更新「势力关系」中的备案状态、联系人、敌对势力或可调用资源。
  主线推进:
    - 「主线进度」记录世界大势、正史锚点、玩家偏移和世界压力，不替代「当前灵异事件」或「世界线记录」。
    - 重大灵异事件开始、完成、失败、跳过、延后或被玩家改写时，应更新「主线进度.当前阶段」「阶段状态」「已完成节点」「可触发节点」「偏移等级」或「正史锚点.玩家偏移」。
    - 阶段推进必须有现实因果：玩家行动、时间流逝、事件结果、总部关注、势力介入或灵异复苏强度上升；不要为了推进章节强行拖玩家进入固定事件。
    - 玩家避开原剧情节点时，不要把节点强制拉回原位；应记录为延后、跳过、偏移或恶化，并让灵异以新的媒介、地点、目标或时间继续收束。
    - 「世界压力.灵异复苏强度」「总部关注度」「社会公开度」只能根据已发生迹象逐步变化，不要无依据暴涨。
    - 「下一步推进提示」只用于模型内部保持节奏，不要当作明示任务强塞给玩家。
  资源消耗:
    - 使用鬼烛、替死娃娃、黄金容器、人皮纸等资源时，必须更新「灵异资源.灵异物品」中的剩余状态、效果变化或副作用。
    - 顶层「灵异物品」是开局表单和旧字段，运行期资源消耗不再以它作为主路径。
    - 黄金只能隔绝灵异，不能杀死厉鬼。
    - 鬼烛、替死娃娃等保命资源必须有剩余状态或副作用记录。
  输出约束:
    - 变量更新必须只基于本轮回复中实际发生或明确揭示的内容。
    - 不要把「隐藏档案」的真实杀人规律、关键生路直接告诉玩家；只在变量中保持一致性。
    - 状态面板要使用玩家可感知的信息，隐藏档案只用于模型内部推演。
