---
变量输出格式:
  rule:
    - you must output the update analysis and the actual update commands at once in the end of the next reply
    - the update commands work like the JSON Patch RFC 6902 standard, must be a valid JSON array containing operation objects, but supports the following operations instead
    - supported operations are replace, delta, insert, remove, move
    - replace updates an existing path
    - delta updates an existing number path by a numeric delta
    - insert adds a new object key or appends to an array when using "-" as array index
    - remove deletes an object key or array item
    - move moves a value from one path to another
    - don't update field names that start with "_" because they are readonly
    - keep hidden files consistent, but do not reveal hidden file contents in the normal narrative
    - write patch paths against stat_data, for example /当前灵异事件/猜测杀人规律/- or /主线进度/当前阶段
    - death danger must use /风险值; never write /死亡风险 because 死亡风险 is only a UI label
    - ghost resurrection risk must primarily use /驭鬼者状态/总复苏风险; /厉鬼复苏程度 is only a legacy compatibility mirror, not the main path
    - when resolving a selected high-risk option, include /风险值 deltas for death danger and include /驭鬼者状态/总复苏风险 deltas when ghost power is used
    - before choosing risk deltas, apply 灵异对抗判定规则 v1 and 厉鬼恐怖程度与灾害等级规则: law trigger, medium contact, ghost domain, terror-level calibration, puzzle suppression, resource cost, visible evidence, then result
    - before resolving uncertain actions, apply 灵异判定路由与输入锁规则: decide no-check / investigation / medium / ghost-domain / ghost-power / suppression-containment / law-verification route, then lock hidden information
    - risk delta reference: daily investigation 0-3; medium contact 5-12; suspected killing-condition medium 12-25; ghost domain 8-20; deep/closed domain 20-35; ghost power revival 10-20; overuse or suppression 20-35; body testing or direct law hit 25-45
    - if the action directly hits a known or hidden killing law, /风险值 delta must normally be at least 25 unless a visible protection resource is consumed
    - C/B/A/S danger level only represents impact range and response pressure; do not use it as combat strength. If terror level is unknown, infer conservatively from visible law, medium, ghost domain, puzzle suppression, growth, containment difficulty, and available resources
    - do not write to nonexistent schema paths such as /当前灵异事件/恐怖程度 unless the schema is expanded later; summarize visible terror-level judgment inside /最近行动判定, /规律推理记录, /当前灵异事件/可见摘要, or /隐藏档案 as appropriate
    - every /最近行动判定.依据 item must be player-visible evidence; never cite hidden truth, true killing law, key survival route, or true ghost location
    - REQUIRED after every resolved player action: include one replace operation for /最近行动判定; do not leave it at the default 未判定 object
    - REQUIRED whenever you output or refresh A/B/C/D action options: include one replace operation for /行动建议 as an array of 0 to 4 objects containing 选项、思路、主要风险、预期收益
    - /最近行动判定 and /行动建议 must only summarize player-visible reasoning and must not reveal hidden truth
    - /最近行动判定 values must include 类型、行动、依据、触发项、结果、代价、死亡风险变化、复苏风险变化、资源代价、后续建议、可见结论
    - /规律推理记录 values must be objects with 时间点、行为、观察结果、推断、确认等级、是否触发规律、风险等级; never insert a plain string into /规律推理记录
    - 确认等级 must be one of 猜测、疑似、部分确认、已验证、可执行应对
    - never use obsolete or English pseudo paths such as /known_rules, /current_event, /in_scene_characters, /death_risk, /resurrection_risk, /status, /location; use the Chinese schema paths shown in stat_data instead
  format: |-
    <UpdateVariable>
    <Analysis>$(IN ENGLISH, no more than 80 words: time/transition; evidence; law update; risk/resurrection/resource/faction changes)</Analysis>
    <JSONPatch>
    [
      { "op": "delta", "path": "/风险值", "value": 10 },
      { "op": "delta", "path": "/驭鬼者状态/总复苏风险", "value": 15 },
      { "op": "insert", "path": "/当前灵异事件/猜测杀人规律/-", "value": "听到连续敲门声后会被标记" },
      { "op": "insert", "path": "/规律推理记录/-", "value": { "时间点": "本轮", "行为": "观察敲门声", "观察结果": "敲门声靠近但未确认袭击条件", "推断": "敲门声可能是媒介", "确认等级": "疑似", "是否触发规律": "未确认", "风险等级": "高" } },
      { "op": "replace", "path": "/最近行动判定", "value": { "类型": "规律试探", "行动": "点燃鬼烛并观察", "依据": ["敲门声靠近", "鬼烛可隔绝袭击"], "触发项": ["疑似媒介", "保护资源"], "结果": "暂未被袭击", "代价": "消耗鬼烛", "死亡风险变化": "+10", "复苏风险变化": "+15", "资源代价": "鬼烛持续燃烧", "后续建议": "保持距离并继续验证敲门声来源", "可见结论": "敲门声与袭击有关但未完全确认" } },
      { "op": "replace", "path": "/行动建议", "value": [{ "选项": "A", "思路": "继续观察", "主要风险": "错过撤离窗口", "预期收益": "获得线索" }] }
    ]
    </JSONPatch>
    </UpdateVariable>
