---
update_output_contract:
  must_output: |-
    End every reply with one variable update block. Update only facts that happened, were revealed, or were resolved in this turn.
    The payload inside <UpdateVariable> must be a <JSONPatch> block containing one valid JSON array. Do not include an analysis tag, prose, code fences, comments, standalone English/foreign-language draft, <draft>, <pacing_rules>, <修改确认>, standalone patch block, or debug note.

    <UpdateVariable>
    <JSONPatch>
    [
      { "op": "delta", "path": "/风险值", "value": 0 },
      { "op": "delta", "path": "/驭鬼者状态/总复苏风险", "value": 0 },
      { "op": "replace", "path": "/最近行动判定", "value": { "类型": "investigate/move/use-ghost/suppress/test-rule/use-resource", "行动": "current action", "依据": ["player-visible evidence"], "触发项": ["visible medium or risk"], "结果": "visible result", "代价": "resource/injury/attention/time", "死亡风险变化": "+0", "复苏风险变化": "+0", "资源代价": "none or exact cost", "后续建议": "visible next step", "可见结论": "no hidden truth" } },
      { "op": "replace", "path": "/行动建议", "value": [
        { "选项": "A", "思路": "visible plan A", "主要风险": "visible risk A", "预期收益": "visible gain A", "死亡风险": "低/中/高/致命/未知", "复苏风险": "无/低/中/高/致命/未知" },
        { "选项": "B", "思路": "visible plan B", "主要风险": "visible risk B", "预期收益": "visible gain B", "死亡风险": "低/中/高/致命/未知", "复苏风险": "无/低/中/高/致命/未知" },
        { "选项": "C", "思路": "visible plan C", "主要风险": "visible risk C", "预期收益": "visible gain C", "死亡风险": "低/中/高/致命/未知", "复苏风险": "无/低/中/高/致命/未知" },
        { "选项": "D", "思路": "自定义行动", "主要风险": "取决于玩家输入", "预期收益": "保留自由行动", "死亡风险": "未知", "复苏风险": "未知" }
      ] }
    ]
    </JSONPatch>
    </UpdateVariable>
  patch_rules:
    - The patch payload must be a valid JSON array inside <JSONPatch> within <UpdateVariable>. Never place the JSON array directly under <UpdateVariable>. Supported ops: replace, delta, insert, remove, move.
    - Never output op:"add". For array append use op:"insert" with a .../- path. For scalar/object field overwrite use op:"replace".
    - Never output analysis text or any explanatory text inside <UpdateVariable>; the first non-space tag after <UpdateVariable> must be <JSONPatch>, and the last non-space tag before </UpdateVariable> must be </JSONPatch>.
    - Paths are rooted at stat_data. Never use obsolete paths: /known_rules, /current_event, /in_scene_characters, /death_risk, /resurrection_risk, /status, /location.
    - Do not update readonly fields whose names start with _.
    - Death danger uses /风险值 only. Ghost revival risk uses /驭鬼者状态/总复苏风险. Do not write /死亡风险; /厉鬼复苏程度 is legacy mirror only.
    - Every resolved player action must replace /最近行动判定. Whenever A/B/C/D options are output or refreshed, replace /行动建议.
    - When <choices> is output or refreshed, /行动建议 must contain exactly A, B, C, and D, and must match <choices>. D is always 自定义行动. Do not require <sp_choices> or visible A/B/C/D options.
    - /最近行动判定, /行动建议, /收录档案, and /收录规律 may contain only player-visible evidence. Never reveal hidden files, complete killing laws, key survival routes, or true ghost locations.
    - Insert objects, not strings, into /规律推理记录/-. Required fields: 时间点, 行为, 观察结果, 推断, 确认等级, 是否触发规律, 风险等级. 确认等级 is one of 猜测, 疑似, 部分确认, 已验证, 可执行应对.
    - When ghost power, ghost domain, medium contact, body testing, wrong deduction, supernatural item cost, or faction intervention occurs, update the matching risk/resource/event/rule/worldline fields.
