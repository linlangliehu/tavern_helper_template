---
变量更新规则:
  神秘复苏铁律:
    - 鬼无法被杀死，只能被压制、关押、转移、绕开或被另一只鬼暂时制衡。
    - 能对付鬼的只有鬼；普通武器、普通体能和普通理性只能拖延，不能真正解决灵异事件。
    - 未被观察验证的杀人规律只能写入「猜测杀人规律」，不能直接写入「已知杀人规律」。
    - 经过明确观察、试探、代价或死亡案例验证后，猜测才能转入「已知杀人规律」。
    - 玩家误判规律、采取无效策略或被线索误导时，必须记录到「错误推断」或「规律推理记录」。
  风险与死亡:
    - 「风险值」表示玩家角色整体死亡风险，范围 0 到 100；达到或超过 100 时，角色死亡，本次模拟结束。
    - 状态面板中的「死亡风险」只是「风险值」的显示名称，不是 MVU 变量路径；变量更新不得写入「死亡风险」。
    - 玩家被厉鬼袭击、误判杀人规律、进入高危鬼域、失去保护资源、重伤或被灵异标记时，必须增加「风险值」。
    - 玩家选择的推演选项若会暴露在杀人规律、鬼域袭击、错误路线、失去保护或高概率受伤中，结算时必须增加「风险值」。轻度危险通常增加 3 到 8 点；明显危险通常增加 10 到 20 点；致命误判或直接命中杀人规律可增加 30 点以上。
    - 如果「风险值」达到或超过 100，必须将「状态」更新为「死亡」，将「主线进度.阶段状态」更新为「模拟结束」，并在正文中明确本次模拟结束。
    - 完成当前主线节点、成功处理当前灵异事件、暂时脱离当前灵异事件影响范围、进入黄金隔绝环境、获得总部救援或明确解除灵异标记后，应根据安全程度降低「风险值」。短暂脱离通常降低 5 到 10 点；完成关键节点或稳定隔绝通常降低 10 到 20 点；彻底处理事件可降低更多。
    - 降低「风险值」只能来自明确的逃脱、隔绝、压制、替死、救援、完成主线节点、暂时脱离灵异事件或解除标记，不能无依据下降。
  复苏与代价:
    - 「驭鬼者状态.总复苏风险」是正式复苏风险字段；「厉鬼复苏程度」只作为旧字段兼容镜像，不作为主更新目标。
    - 使用厉鬼能力、强行对抗高等级厉鬼、进入鬼域深处或被灵异侵蚀时，必须增加「驭鬼者状态.总复苏风险」。
    - 每次主动使用自身厉鬼能力，通常增加 10 到 20 点复苏风险；若使用过度或被压制，增加更多。
    - 玩家选择的推演选项若主动使用厉鬼能力、强行压制厉鬼、进入鬼域深处或以身体试探规律，结算时必须增加「驭鬼者状态.总复苏风险」，并根据反噬程度同步增加「风险值」。
    - 如果某只鬼拼图被触发，优先更新「驭鬼者状态.已驾驭厉鬼」中对应对象的「复苏进度」。
    - 当复苏风险达到或超过 100，应判定厉鬼复苏或进入极端濒死状态，除非有明确的鬼与鬼压制、死机或替死资源。
  灵异事件档案:
    - 出现新灵异事件时，更新「当前灵异事件.事件代号」「发生地点」「处理状态」。
    - 危害等级必须根据已表现出的影响逐步判断，不要随意给出 S 级，也不要无理由降级。
    - 出现鬼域、城市扩散、群体死亡或总部介入时，更新「鬼域状态」「扩散趋势」「已死亡人数」「势力关系」。
    - 每个灵异事件条目触发时，都要检查是否需要更新「当前灵异事件.鬼域状态」「猜测杀人规律」「已知杀人规律」「错误推断」和「规律推理记录」。
    - 真实杀人规律、关键生路、鬼的真实位置、误导线索和高权限情报优先写入「隐藏档案」，不要直接写进正文或状态面板。
    - 玩家改变死亡名单、关键人物状态、灵异物品归属、地点封锁状态、总部行动或原剧情节点时，必须写入「世界线记录」。
    - 总部、负责人、朋友圈、灵异论坛、国王组织、民间驭鬼者、鬼邮局信使等势力介入时，必须更新「势力关系」中的备案状态、联系人、敌对势力或可调用资源。
  主线推进:
    - 「主线进度」记录世界大势、正史锚点、玩家偏移和世界压力，不替代「当前灵异事件」或「世界线记录」。
    - 重大灵异事件开始、完成、失败、跳过、延后或被玩家改写时，应更新「主线进度.当前阶段」「阶段状态」「已完成节点」「可触发节点」「偏移等级」或「正史锚点.玩家偏移」。
    - 阶段推进必须有现实因果：玩家行动、时间流逝、事件结果、总部关注、势力介入或灵异复苏强度上升；不要为了推进章节强行拖玩家进入固定事件。
    - 玩家避开原剧情节点时，不要把节点强制拉回原位；应记录为延后、跳过、偏移或恶化，并让灵异以新的媒介、地点、目标或时间继续收束。
    - 「世界压力.灵异复苏强度」「总部关注度」「社会公开度」只能根据已发生迹象逐步变化，不要无依据暴涨。
    - 「下一步推进提示」只用于模型内部保持节奏，不要当作明示任务强塞给玩家。
  资源消耗:
    - 使用鬼烛、替死娃娃、黄金容器、人皮纸等资源时，必须更新「灵异资源.灵异物品」中的剩余状态、效果变化或副作用。
    - 顶层「灵异物品」是开局表单和旧字段，运行期资源消耗不再以它作为主路径。
    - 黄金只能隔绝灵异，不能杀死厉鬼。
    - 鬼烛、替死娃娃等保命资源必须有剩余状态或副作用记录。
  输出约束:
    - 变量更新必须只基于本轮回复中实际发生或明确揭示的内容。
    - 不要把「隐藏档案」的真实杀人规律、关键生路直接告诉玩家；只在变量中保持一致性。
    - 状态面板要使用玩家可感知的信息，隐藏档案只用于模型内部推演。
